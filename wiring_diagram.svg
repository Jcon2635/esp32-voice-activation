<svg width="100%" viewBox="0 0 680 1180" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>ESP32 Voice-Activated Trap Thrower — Wiring Diagram v4</title>
  <desc>Three-unit wiring diagram: Mic Unit (ESP32-S3 #1 + INMP441) top-left, Controller Unit (ESP32-S3 #2 + KY-019 relay) top-right, Corded Remote Box bottom-center connected via 5-conductor cable.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; fill: #1a1a1a; }
    .th  { font-size: 14px; font-weight: 700; }
    .ts  { font-size: 11px; font-weight: 400; fill: #555; }
    .tm  { font-size: 12px; font-weight: 400; }
    .sec { font-size: 13px; font-weight: 700; }
    .sect-purple { fill: #f7f6ff; stroke: #AFA9EC; stroke-width: 0.75; stroke-dasharray: 4 3; }
    .sect-blue   { fill: #f0f7fd; stroke: #85B7EB; stroke-width: 0.75; stroke-dasharray: 4 3; }
    .sect-green  { fill: #f2f9ea; stroke: #97C459; stroke-width: 0.75; stroke-dasharray: 4 3; }
    .board-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 1; }
    .board-blue   { fill: #E6F1FB; stroke: #185FA5; stroke-width: 1; }
    .board-teal   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; }
    .board-amber  { fill: #FAEEDA; stroke: #854F0B; stroke-width: 1; }
    .board-coral  { fill: #FAECE7; stroke: #993C1D; stroke-width: 1; }
    .board-gray   { fill: #F1EFE8; stroke: #888780; stroke-width: 0.75; }
    .board-green  { fill: #EAF3DE; stroke: #3B6D11; stroke-width: 1; }
    .legend-box   { fill: none; stroke: #cccccc; stroke-width: 0.75; }
  </style>

  <!-- ═══ UNIT A — MIC UNIT ═══ -->
  <rect class="sect-purple" x="12" y="12" width="310" height="490" rx="12"/>
  <text class="sec" x="167" y="32" text-anchor="middle" fill="#3C3489">Unit A — Mic unit  (ESP32-S3 #1)</text>

  <!-- ESP32-S3 #1 -->
  <rect class="board-purple" x="30" y="44" width="200" height="210" rx="10"/>
  <text class="th" x="130" y="66" text-anchor="middle" fill="#3C3489">ESP32-S3 #1</text>
  <text class="ts" x="130" y="81" text-anchor="middle" fill="#534AB7">Mic unit</text>

  <!-- #1 right pins -->
  <rect fill="#E85D24" stroke="#C04828" x="228" y="100" width="14" height="12" rx="2"/>
  <text class="ts" x="224" y="110" text-anchor="end">3.3V</text>
  <rect fill="#333" stroke="#777" x="228" y="118" width="14" height="12" rx="2"/>
  <text class="ts" x="224" y="128" text-anchor="end">GND</text>
  <rect fill="#1D9E75" stroke="#0F6E56" x="228" y="136" width="14" height="12" rx="2"/>
  <text class="ts" x="224" y="146" text-anchor="end">GPIO 8  SD</text>
  <rect fill="#1D9E75" stroke="#0F6E56" x="228" y="154" width="14" height="12" rx="2"/>
  <text class="ts" x="224" y="164" text-anchor="end">GPIO 5  SCK</text>
  <rect fill="#1D9E75" stroke="#0F6E56" x="228" y="172" width="14" height="12" rx="2"/>
  <text class="ts" x="224" y="182" text-anchor="end">GPIO 6  WS</text>

  <!-- #1 left pins (LED) -->
  <rect fill="#E85D24" stroke="#C04828" x="32" y="200" width="14" height="12" rx="2"/>
  <text class="ts" x="50" y="210" text-anchor="start">3.3V → LED+</text>
  <rect fill="#333" stroke="#777" x="32" y="218" width="14" height="12" rx="2"/>
  <text class="ts" x="50" y="228" text-anchor="start">GND → LED−</text>

  <!-- INMP441 -->
  <rect class="board-teal" x="30" y="320" width="200" height="110" rx="10"/>
  <text class="th" x="130" y="343" text-anchor="middle" fill="#085041">INMP441</text>
  <text class="ts" x="130" y="358" text-anchor="middle" fill="#0F6E56">I2S MEMS microphone</text>
  <text class="ts" x="130" y="374" text-anchor="middle" fill="#888">⚠  VDD = 3.3V only</text>

  <!-- INMP441 top pins -->
  <rect fill="#E85D24" stroke="#C04828" x="48"  y="308" width="12" height="14" rx="2"/>
  <text class="ts" x="54"  y="305" text-anchor="middle">VDD</text>
  <rect fill="#333" stroke="#777" x="70"  y="308" width="12" height="14" rx="2"/>
  <text class="ts" x="76"  y="305" text-anchor="middle">GND</text>
  <rect fill="#1D9E75" stroke="#0F6E56" x="92"  y="308" width="12" height="14" rx="2"/>
  <text class="ts" x="98"  y="305" text-anchor="middle">SD</text>
  <rect fill="#1D9E75" stroke="#0F6E56" x="114" y="308" width="12" height="14" rx="2"/>
  <text class="ts" x="120" y="305" text-anchor="middle">SCK</text>
  <rect fill="#1D9E75" stroke="#0F6E56" x="136" y="308" width="12" height="14" rx="2"/>
  <text class="ts" x="142" y="305" text-anchor="middle">WS</text>
  <rect fill="#333" stroke="#777" x="158" y="308" width="12" height="14" rx="2"/>
  <text class="ts" x="164" y="305" text-anchor="middle">L/R</text>

  <!-- Wires A: ESP32 #1 → INMP441 -->
  <polyline fill="none" stroke="#E85D24" stroke-width="1.5" stroke-linecap="round" points="242,106 258,106 258,278 54,278 54,308"/>
  <polyline fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" points="242,124 262,124 262,283 76,283 76,308"/>
  <polyline fill="none" stroke="#555" stroke-width="1.2" stroke-dasharray="4 3" stroke-linecap="round" points="262,283 164,283 164,308"/>
  <polyline fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" points="242,142 266,142 266,287 98,287 98,308"/>
  <polyline fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" points="242,160 270,160 270,291 120,291 120,308"/>
  <polyline fill="none" stroke="#3d8b6e" stroke-width="1.5" stroke-linecap="round" points="242,178 274,178 274,294 142,294 142,308"/>

  <!-- Power switch + LED box -->
  <rect class="board-gray" x="30" y="452" width="200" height="38" rx="8"/>
  <text class="th" x="130" y="469" text-anchor="middle" fill="#2C2C2A">Power switch + LED indicator</text>
  <text class="ts" x="130" y="483" text-anchor="middle">SW in series with USB-C 5V  •  LED on 3.3V</text>

  <!-- Dashed lines LED → switch box -->
  <polyline fill="none" stroke="#E85D24" stroke-width="1" stroke-dasharray="3 3" stroke-linecap="round" points="32,206 18,206 18,471 30,471"/>
  <polyline fill="none" stroke="#555" stroke-width="1" stroke-dasharray="3 3" stroke-linecap="round" points="32,224 14,224 14,480 30,480"/>

  <!-- ═══ UNIT B — CONTROLLER UNIT ═══ -->
  <rect class="sect-blue" x="360" y="12" width="310" height="560" rx="12"/>
  <text class="sec" x="515" y="32" text-anchor="middle" fill="#0C447C">Unit B — Controller unit  (ESP32-S3 #2)</text>

  <!-- ESP32-S3 #2 -->
  <rect class="board-blue" x="378" y="44" width="200" height="230" rx="10"/>
  <text class="th" x="478" y="66" text-anchor="middle" fill="#0C447C">ESP32-S3 #2</text>
  <text class="ts" x="478" y="81" text-anchor="middle" fill="#185FA5">Controller unit</text>

  <!-- #2 left pins -->
  <rect fill="#C04828" stroke="#7a2810" x="360" y="100" width="14" height="12" rx="2"/>
  <text class="ts" x="378" y="110" text-anchor="start">5V / VIN</text>
  <rect fill="#333" stroke="#777" x="360" y="118" width="14" height="12" rx="2"/>
  <text class="ts" x="378" y="128" text-anchor="start">GND</text>
  <rect fill="#378ADD" stroke="#185FA5" x="360" y="136" width="14" height="12" rx="2"/>
  <text class="ts" x="378" y="146" text-anchor="start">GPIO 4  (SW2 voice disable)</text>
  <rect fill="#378ADD" stroke="#185FA5" x="360" y="154" width="14" height="12" rx="2"/>
  <text class="ts" x="378" y="164" text-anchor="start">GPIO 9  (BTN manual fire)</text>

  <!-- #2 right pin (relay out) -->
  <rect fill="#BA7517" stroke="#854F0B" x="576" y="168" width="14" height="12" rx="2"/>
  <text class="ts" x="592" y="178" text-anchor="start">GPIO 10</text>

  <!-- Pullup resistors -->
  <rect class="board-gray" x="378" y="292" width="200" height="38" rx="8"/>
  <text class="th" x="478" y="309" text-anchor="middle" fill="#2C2C2A">10k pullup resistors</text>
  <text class="ts" x="478" y="323" text-anchor="middle">R1: GPIO 4 → 3.3V  •  R2: GPIO 9 → 3.3V</text>

  <!-- KY-019 -->
  <rect class="board-amber" x="378" y="348" width="200" height="110" rx="10"/>
  <text class="th" x="478" y="371" text-anchor="middle" fill="#633806">KY-019 Relay</text>
  <text class="ts" x="478" y="386" text-anchor="middle" fill="#854F0B">5V, active-HIGH</text>

  <!-- KY-019 top pins -->
  <rect fill="#C04828" stroke="#7a2810" x="396" y="336" width="12" height="14" rx="2"/>
  <text class="ts" x="402" y="332" text-anchor="middle">VCC</text>
  <rect fill="#333" stroke="#777" x="418" y="336" width="12" height="14" rx="2"/>
  <text class="ts" x="424" y="332" text-anchor="middle">GND</text>
  <rect fill="#BA7517" stroke="#854F0B" x="440" y="336" width="12" height="14" rx="2"/>
  <text class="ts" x="446" y="332" text-anchor="middle">IN</text>

  <!-- KY-019 bottom pins -->
  <rect fill="#777" stroke="#555" x="396" y="456" width="12" height="14" rx="2"/>
  <text class="ts" x="402" y="482" text-anchor="middle">COM</text>
  <rect fill="#777" stroke="#555" x="418" y="456" width="12" height="14" rx="2"/>
  <text class="ts" x="424" y="482" text-anchor="middle">NO</text>
  <rect fill="#999" stroke="#777" x="440" y="456" width="12" height="14" rx="2"/>
  <text class="ts" x="446" y="482" text-anchor="middle">NC</text>

  <!-- Wires B: ESP32 #2 → KY-019 -->
  <polyline fill="none" stroke="#C04828" stroke-width="1.5" stroke-linecap="round" points="360,106 340,106 340,316 402,316 402,336"/>
  <polyline fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" points="360,124 336,124 336,320 424,320 424,336"/>
  <polyline fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" points="590,174 622,174 622,324 446,324 446,336"/>

  <!-- Trap box -->
  <rect class="board-gray" x="378" y="496" width="200" height="56" rx="8"/>
  <text class="th" x="478" y="516" text-anchor="middle" fill="#2C2C2A">Trap throw button</text>
  <text class="ts" x="478" y="531" text-anchor="middle">Dry contact — 300ms closure on trigger</text>
  <text class="ts" x="478" y="544" text-anchor="middle">COM → safety SW → wire 1  •  NO → wire 2</text>

  <!-- Wires: Relay → Trap -->
  <polyline fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" points="402,470 402,488 438,488 438,496"/>
  <polyline fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" points="424,470 424,492 520,492 520,496"/>
  <text class="ts" x="658" y="470" text-anchor="end" fill="#aaa">NC — unused</text>
  <line x1="452" y1="470" x2="596" y2="466" stroke="#ddd" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- ═══ ESP-NOW link ═══ -->
  <text class="tm" x="340" y="160" text-anchor="middle" fill="#666">ESP-NOW</text>
  <text class="ts" x="340" y="174" text-anchor="middle" fill="#999">2.4 GHz  /  &lt;5 ms  /  up to 30 m</text>
  <line x1="232" y1="156" x2="314" y2="156" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
  <line x1="346" y1="156" x2="360" y2="156" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- ═══ UNIT C — CORDED REMOTE BOX ═══ -->
  <rect class="sect-green" x="130" y="622" width="422" height="336" rx="12"/>
  <text class="sec" x="341" y="642" text-anchor="middle" fill="#27500A">Unit C — Corded remote box  (3D printed, GX16-5 connector)</text>

  <!-- Remote interior -->
  <rect class="board-green" x="148" y="654" width="386" height="284" rx="10"/>

  <!-- SW1 -->
  <rect class="board-gray" x="164" y="672" width="154" height="58" rx="8"/>
  <text class="th" x="241" y="692" text-anchor="middle" fill="#2C2C2A">SW1 — Master power</text>
  <text class="ts" x="241" y="707" text-anchor="middle">SPST toggle</text>
  <text class="ts" x="241" y="720" text-anchor="middle">In series with 5V supply line</text>

  <!-- SW2 -->
  <rect class="board-gray" x="364" y="672" width="154" height="58" rx="8"/>
  <text class="th" x="441" y="692" text-anchor="middle" fill="#2C2C2A">SW2 — Voice disable</text>
  <text class="ts" x="441" y="707" text-anchor="middle">SPST toggle</text>
  <text class="ts" x="441" y="720" text-anchor="middle">→ GPIO 4 on controller</text>

  <!-- BTN -->
  <rect class="board-coral" x="226" y="758" width="230" height="58" rx="8"/>
  <text class="th" x="341" y="778" text-anchor="middle" fill="#4A1B0C">BTN — Manual fire</text>
  <text class="ts" x="341" y="793" text-anchor="middle">Momentary NO pushbutton (red)</text>
  <text class="ts" x="341" y="807" text-anchor="middle">→ GPIO 9 on controller</text>

  <!-- 5-conductor cable label -->
  <text class="th" x="341" y="848" text-anchor="middle" fill="#27500A">5-conductor cable  (6–10 m)</text>

  <!-- Cable pins row -->
  <rect fill="#C04828" stroke="#7a2810" x="160" y="856" width="12" height="14" rx="2"/>
  <text class="ts" x="166" y="853" text-anchor="middle">1</text>
  <text class="ts" x="166" y="879" text-anchor="middle">Red</text>
  <text class="ts" x="166" y="891" text-anchor="middle">SW1 in</text>

  <rect fill="#ddd" stroke="#999" x="190" y="856" width="12" height="14" rx="2"/>
  <text class="ts" x="196" y="853" text-anchor="middle">2</text>
  <text class="ts" x="196" y="879" text-anchor="middle">White</text>
  <text class="ts" x="196" y="891" text-anchor="middle">SW1 out</text>

  <rect fill="#639922" stroke="#3B6D11" x="320" y="856" width="12" height="14" rx="2"/>
  <text class="ts" x="326" y="853" text-anchor="middle">3</text>
  <text class="ts" x="326" y="879" text-anchor="middle">Green</text>
  <text class="ts" x="326" y="891" text-anchor="middle">SW2</text>

  <rect fill="#D4537E" stroke="#993556" x="356" y="856" width="12" height="14" rx="2"/>
  <text class="ts" x="362" y="853" text-anchor="middle">4</text>
  <text class="ts" x="362" y="879" text-anchor="middle">Yellow</text>
  <text class="ts" x="362" y="891" text-anchor="middle">BTN</text>

  <rect fill="#333" stroke="#777" x="486" y="856" width="12" height="14" rx="2"/>
  <text class="ts" x="492" y="853" text-anchor="middle">5</text>
  <text class="ts" x="492" y="879" text-anchor="middle">Black</text>
  <text class="ts" x="492" y="891" text-anchor="middle">GND</text>

  <!-- Cable wires going up to controller -->
  <!-- SW1 power in (red pin 1) → controller 5V/VIN -->
  <polyline fill="none" stroke="#C04828" stroke-width="1.5" stroke-linecap="round"
    points="166,856 166,614 336,614 336,106 360,106"/>
  <!-- SW1 power out (white pin 2) dashed — returns to board after switch -->
  <polyline fill="none" stroke="#bbb" stroke-width="1.2" stroke-dasharray="3 4" stroke-linecap="round"
    points="196,856 196,618 196,618"/>
  <text class="ts" x="270" y="610" text-anchor="middle" fill="#C04828">SW1 cuts 5V to controller (pins 1+2)</text>

  <!-- SW2 (green pin 3) → GPIO 4 -->
  <polyline fill="none" stroke="#639922" stroke-width="1.5" stroke-linecap="round"
    points="326,856 326,626 344,626 344,136 360,136"/>

  <!-- BTN (yellow pin 4) → GPIO 9 -->
  <polyline fill="none" stroke="#D4537E" stroke-width="1.5" stroke-linecap="round"
    points="362,856 362,630 348,630 348,154 360,154"/>

  <!-- GND (black pin 5) → controller GND -->
  <polyline fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"
    points="492,856 492,634 340,634 340,124 360,124"/>

  <!-- GX16 + cable gland note -->
  <text class="ts" x="341" y="920" text-anchor="middle" fill="#555">GX16-5 aviation connector  •  PG7 cable gland for strain relief</text>

  <!-- ═══ LEGEND ═══ -->
  <rect class="legend-box" x="20" y="982" width="640" height="182" rx="10"/>
  <text class="th" x="340" y="1002" text-anchor="middle">Legend</text>

  <line x1="40"  y1="1022" x2="76"  y2="1022" stroke="#E85D24" stroke-width="2" stroke-linecap="round"/>
  <rect fill="#E85D24" stroke="#C04828" x="80"  y="1015" width="12" height="12" rx="2"/>
  <text class="tm" x="98" y="1026">Power 3.3V</text>

  <line x1="40"  y1="1042" x2="76"  y2="1042" stroke="#C04828" stroke-width="2" stroke-linecap="round"/>
  <rect fill="#C04828" stroke="#7a2810" x="80"  y="1035" width="12" height="12" rx="2"/>
  <text class="tm" x="98" y="1046">Power 5V / SW1 line (Red, cable pin 1)</text>

  <line x1="40"  y1="1062" x2="76"  y2="1062" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <rect fill="#333" stroke="#777" x="80"  y="1055" width="12" height="12" rx="2"/>
  <text class="tm" x="98" y="1066">Ground</text>

  <line x1="40"  y1="1082" x2="76"  y2="1082" stroke="#1D9E75" stroke-width="2" stroke-linecap="round"/>
  <rect fill="#1D9E75" stroke="#0F6E56" x="80"  y="1075" width="12" height="12" rx="2"/>
  <text class="tm" x="98" y="1086">I2S data / clock / word select (SD / SCK / WS)</text>

  <line x1="40"  y1="1102" x2="76"  y2="1102" stroke="#555" stroke-width="1.2" stroke-dasharray="4 3" stroke-linecap="round"/>
  <text class="tm" x="98" y="1106">GND tie (INMP441 L/R pin)</text>

  <line x1="40"  y1="1122" x2="76"  y2="1122" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5 3" stroke-linecap="round"/>
  <text class="tm" x="98" y="1126">ESP-NOW wireless link</text>

  <line x1="300" y1="1022" x2="336" y2="1022" stroke="#BA7517" stroke-width="2" stroke-linecap="round"/>
  <rect fill="#BA7517" stroke="#854F0B" x="340" y="1015" width="12" height="12" rx="2"/>
  <text class="tm" x="358" y="1026">Relay signal — GPIO 10, active-HIGH (KY-019)</text>

  <line x1="300" y1="1042" x2="336" y2="1042" stroke="#639922" stroke-width="2" stroke-linecap="round"/>
  <rect fill="#639922" stroke="#3B6D11" x="340" y="1035" width="12" height="12" rx="2"/>
  <text class="tm" x="358" y="1046">SW2 voice disable — GPIO 4 (Green, cable pin 3)</text>

  <line x1="300" y1="1062" x2="336" y2="1062" stroke="#D4537E" stroke-width="2" stroke-linecap="round"/>
  <rect fill="#D4537E" stroke="#993556" x="340" y="1055" width="12" height="12" rx="2"/>
  <text class="tm" x="358" y="1066">BTN manual fire — GPIO 9 (Yellow, cable pin 4)</text>

  <line x1="300" y1="1082" x2="336" y2="1082" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <rect fill="#777" stroke="#555" x="340" y="1075" width="12" height="12" rx="2"/>
  <text class="tm" x="358" y="1086">Trap contact wires (relay COM / NO)</text>

  <line x1="300" y1="1102" x2="336" y2="1102" stroke="#378ADD" stroke-width="2" stroke-linecap="round"/>
  <rect fill="#378ADD" stroke="#185FA5" x="340" y="1095" width="12" height="12" rx="2"/>
  <text class="tm" x="358" y="1106">Remote control inputs — GPIO 4 + GPIO 9</text>
</svg>
